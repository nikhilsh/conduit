name                = "claude"
command             = ["claude"]
args                = ["--dangerously-skip-permissions"]
env_passthrough     = ["ANTHROPIC_API_KEY"]
workdir             = "/workspace"
chat_event_port_env = "AGENT_CHAT_PORT"
# Surfaced on the iOS / Android agent pill so users can see what
# they're paying for at a glance. Threading it from a CLI flag is
# v1.x; this is the static per-adapter label.
reasoning_effort    = "medium"

# --- Phase 1: manifest-driven fields (WS-1.1) ---
protocol            = "stream-json"
config_dir          = ".claude"
cred_files          = [".claude/.credentials.json", ".claude.json"]
resume_args         = ["--resume", "{session_id}"]
continue_args       = ["--continue"]
model_args          = ["--model", "{model}"]
effort_args         = ["--effort", "{effort}"]
login_provider      = "anthropic"

[permission_modes.plan]
drop_args = ["--dangerously-skip-permissions"]
add_args  = ["--permission-mode", "plan"]

[hooks]
on_start = "conduit memory render --session $SESSION_UUID > /workspace/.conduit/HANDOFF.html"
on_exit  = "conduit memory checkpoint --session $SESSION_UUID --reason 'exit'"
on_swap  = "conduit memory handoff --session $SESSION_UUID --from $FROM_AGENT --to $TO_AGENT"
