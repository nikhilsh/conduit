name: website-deploy
run-name: deploy website (manual)

on:
  workflow_dispatch:
    inputs:
      broker_password:
        description: 'Override BROKER_PAGE_PASSWORD (leave blank to use code default)'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy-website:
    name: deploy website to Fyra
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fyra CLI
        # Runner DNS has intermittently failed to resolve fyra.sh (single
        # upstream NS); fall back to DNS-over-HTTPS + /etc/hosts pin. The old
        # `curl | sh` also masked download failures — download, run, verify.
        run: |
          set -euo pipefail
          if ! getent hosts fyra.sh >/dev/null; then
            ip=$(curl -fsS --max-time 10 -H 'accept: application/dns-json' \
              'https://1.1.1.1/dns-query?name=fyra.sh&type=A' \
              | jq -r '.Answer[]? | select(.type==1) | .data' | head -1 || true)
            [ -n "$ip" ] && printf '%s fyra.sh\n' "$ip" | sudo tee -a /etc/hosts >/dev/null || true
          fi
          curl -fsSL --retry 5 --retry-all-errors --max-time 120 \
            https://fyra.sh/install.sh -o "$RUNNER_TEMP/fyra-install.sh"
          sh "$RUNNER_TEMP/fyra-install.sh"
          PATH="$HOME/.local/bin:$PATH" command -v fyra >/dev/null \
            || { echo "fyra CLI missing after install"; exit 1; }

      - name: Configure Fyra auth
        env:
          FYRA_TOKEN: ${{ secrets.FYRA_TOKEN }}
          FYRA_SERVER: ${{ secrets.FYRA_SERVER }}
        run: |
          mkdir -p "$HOME/.fyra"
          cat > "$HOME/.fyra/config.yaml" <<EOF
          server_address: ${FYRA_SERVER:-server.fyra.sh:50051}
          token: ${FYRA_TOKEN}
          EOF
          host="${FYRA_SERVER%%:*}"; host="${host:-server.fyra.sh}"
          if ! getent hosts "$host" >/dev/null; then
            ip=$(curl -fsS --max-time 10 -H 'accept: application/dns-json' \
              "https://1.1.1.1/dns-query?name=${host}&type=A" \
              | jq -r '.Answer[]? | select(.type==1) | .data' | head -1 || true)
            [ -n "$ip" ] && printf '%s %s\n' "$ip" "$host" | sudo tee -a /etc/hosts >/dev/null || true
          fi

      - name: Build website
        working-directory: website
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BROKER_PAGE_PASSWORD: ${{ inputs.broker_password }}
        run: node build.mjs

      - name: Deploy website to Fyra
        working-directory: website/out
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          script -q -e -c "fyra push" /dev/null
