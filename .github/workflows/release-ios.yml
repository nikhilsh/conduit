name: release-ios

on:
  push:
    tags: ['v*']

jobs:
  build-ipa:
    name: ad-hoc signed IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Decode signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p $RUNNER_TEMP/signing
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/signing/cert.p12
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/signing/profile.mobileprovision

      - name: Create temp keychain + import cert
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security import $RUNNER_TEMP/signing/cert.p12 \
            -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/signing/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/swekitty.mobileprovision

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Build Rust xcframework
        working-directory: apps/ios
        run: ./build-rust.sh

      - name: Archive
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        working-directory: apps/ios
        run: |
          xcodebuild archive \
            -scheme SweKitty \
            -configuration Release \
            -archivePath build/SweKitty.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$IOS_TEAM_ID

      - name: Export IPA (ad-hoc)
        working-directory: apps/ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SweKitty.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" apps/ios/build/ipa/SweKitty.ipa --clobber
