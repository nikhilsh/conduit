  <text x="348" y="218" fill="#c4d6f4" font-size="13">The refresh fires before the old token's expiry is</text>
  <text x="348" y="236" fill="#c4d6f4" font-size="13">checked, so it re-enters every call. Tightening the guard:</text>
  <!-- diff card -->
  <rect x="348" y="252" width="460" height="124" rx="12" fill="#0a1322" stroke="#22d3ee" stroke-opacity="0.14"/>
  <text x="364" y="274" fill="#7d92b4" font-size="11.5">auth/refresh.go</text><text x="792" y="274" fill="#3ef0a0" font-size="11" text-anchor="end">+6 −2</text>
