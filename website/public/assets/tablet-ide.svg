    <rect x="356" y="309" width="444" height="17" fill="#0e2c1c" opacity="0.6"/><text x="366" y="322"><tspan fill="#3ef0a0">+</tspan><tspan fill="#c4d6f4"> if now &gt;= token.exp-skew {</tspan></text>
    <rect x="356" y="328" width="444" height="17" fill="#0e2c1c" opacity="0.6"/><text x="366" y="341"><tspan fill="#3ef0a0">+</tspan><tspan fill="#c4d6f4">   refresh.Do(once)  // de-dupe</tspan></text>
    <text x="366" y="362" fill="#7d92b4">   return cached, nil</text>
  </g>
