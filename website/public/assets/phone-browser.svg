<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 720" width="390" height="720" fill="none" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <radialGradient id="bGlow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#4f8cff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#04050a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.25"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="390" height="720" rx="44" fill="#05070e"/>
  <rect x="0" y="0" width="390" height="360" rx="44" fill="url(#bGlow)"/>

  <!-- status bar -->
  <text x="22" y="34" fill="#eaf3ff" font-size="15" font-weight="600">9:41</text>
  <rect x="156" y="20" width="78" height="22" rx="11" fill="#01030a"/>
  <g fill="#eaf3ff" opacity="0.92">
    <rect x="300" y="29" width="3" height="5" rx="1"/><rect x="305" y="26" width="3" height="8" rx="1"/>
    <rect x="310" y="23" width="3" height="11" rx="1"/><rect x="315" y="20" width="3" height="14" rx="1"/>
    <path d="M326 28 a7 7 0 0 1 11 0 M329 31 a3.4 3.4 0 0 1 5 0" stroke="#eaf3ff" stroke-width="1.7" fill="none"/>
    <rect x="346" y="22" width="21" height="11" rx="3" stroke="#eaf3ff" stroke-width="1.3" fill="none"/>
    <rect x="348" y="24" width="16" height="7" rx="1.5"/>
  </g>

  <!-- session header -->
  <path d="M34 84l-9 9 9 9" stroke="#9fb2d0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="52" y="99" fill="#eaf3ff" font-size="16" font-weight="600">Add usage dashboard</text>
  <circle cx="350" cy="93" r="13" fill="#06161f" stroke="#22d3ee" stroke-opacity="0.5"/>
  <circle cx="345" cy="92" r="1.5" fill="#22d3ee"/><circle cx="355" cy="92" r="1.5" fill="#22d3ee"/>
  <path d="M345 97 q5 3 10 0" stroke="#22d3ee" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- url bar -->
  <rect x="20" y="116" width="300" height="34" rx="12" fill="#0b1322" stroke="#22d3ee" stroke-opacity="0.16"/>
  <path d="M40 127 a6 6 0 1 1 0 12 a6 6 0 1 1 0 -12 M34 133h12 M40 127 q4 6 0 12 q-4 -6 0 -12" stroke="#3ef0a0" stroke-width="1.2" fill="none"/>
  <text x="56" y="138" fill="#c4d6f4" font-size="13">localhost:5173</text>
  <circle cx="306" cy="133" r="3.4" fill="#3ef0a0"/>
  <g transform="translate(332,121)"><path d="M12 6a6 6 0 1 0 -1.5 4 M12 2v4h-4" stroke="#9fb2d0" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>

  <!-- rendered preview (mock dashboard) -->
  <rect x="20" y="160" width="350" height="446" rx="14" fill="#0a0f1c" stroke="#4f8cff" stroke-opacity="0.16"/>
  <!-- preview top bar -->
  <rect x="20" y="160" width="350" height="52" rx="14" fill="#0e1830"/>
  <rect x="20" y="196" width="350" height="16" fill="#0a0f1c"/>
  <text x="38" y="192" fill="#eaf3ff" font-size="15" font-weight="700">Usage</text>
  <circle cx="352" cy="186" r="10" fill="url(#bHero)"/>
  <!-- hero stat -->
  <rect x="36" y="228" width="318" height="92" rx="12" fill="url(#bHero)" stroke="#4f8cff" stroke-opacity="0.3"/>
  <text x="52" y="256" fill="#bcd0f4" font-size="12">Tokens this week</text>
  <text x="52" y="290" fill="#ffffff" font-size="30" font-weight="800">2.4M</text>
  <text x="250" y="290" fill="#3ef0a0" font-size="13" font-weight="600">▲ 12%</text>
  <!-- mini sparkline -->
  <polyline points="52,308 80,300 108,304 136,292 164,296 192,282 220,288 248,272 276,278 304,262 332,268"
    fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- two stat cards -->
  <rect x="36" y="334" width="152" height="78" rx="11" fill="#0e1830" stroke="#22d3ee" stroke-opacity="0.12"/>
  <text x="52" y="358" fill="#7d92b4" font-size="11">5-hour limit</text>
  <text x="52" y="384" fill="#eaf3ff" font-size="20" font-weight="700">68%</text>
  <rect x="52" y="394" width="120" height="6" rx="3" fill="#16233a"/><rect x="52" y="394" width="82" height="6" rx="3" fill="#3ef0a0"/>
  <rect x="202" y="334" width="152" height="78" rx="11" fill="#0e1830" stroke="#22d3ee" stroke-opacity="0.12"/>
  <text x="218" y="358" fill="#7d92b4" font-size="11">Weekly</text>
  <text x="218" y="384" fill="#eaf3ff" font-size="20" font-weight="700">41%</text>
  <rect x="218" y="394" width="120" height="6" rx="3" fill="#16233a"/><rect x="218" y="394" width="49" height="6" rx="3" fill="#22d3ee"/>
  <!-- table rows -->
  <rect x="36" y="426" width="318" height="40" rx="10" fill="#0e1830"/>
  <circle cx="56" cy="446" r="6" fill="#ff9d4d"/><text x="72" y="450" fill="#c4d6f4" font-size="12">claude · sonnet</text><text x="338" y="450" fill="#eaf3ff" font-size="12" text-anchor="end">1.6M</text>
  <rect x="36" y="472" width="318" height="40" rx="10" fill="#0c1426"/>
  <circle cx="56" cy="492" r="6" fill="#22d3ee"/><text x="72" y="496" fill="#c4d6f4" font-size="12">codex · gpt-5</text><text x="338" y="496" fill="#eaf3ff" font-size="12" text-anchor="end">0.8M</text>
  <rect x="36" y="524" width="200" height="30" rx="8" fill="#13203a"/><text x="52" y="544" fill="#bcd0f4" font-size="12">Export report ↗</text>

  <!-- hot-reload pill (floating) -->
  <rect x="120" y="572" width="150" height="28" rx="14" fill="#0e2c1c" stroke="#3ef0a0" stroke-opacity="0.5"/>
  <circle cx="140" cy="586" r="4" fill="#3ef0a0"/>
  <text x="154" y="591" fill="#3ef0a0" font-size="12" font-weight="600">reloaded · 40ms</text>

  <!-- tab bar -->
  <rect x="0" y="656" width="390" height="64" fill="#070d18"/>
  <line x1="0" y1="656" x2="390" y2="656" stroke="#22d3ee" stroke-opacity="0.12"/>
  <g text-anchor="middle" font-size="11" font-weight="600">
    <g fill="#7d92b4">
      <path d="M58 676 h18 a2 2 0 0 1 2 2 v10 a2 2 0 0 1 -2 2 h-9 l-5 4 v-4 h-4 a2 2 0 0 1 -2 -2 v-10 a2 2 0 0 1 2 -2z" fill="none" stroke="#7d92b4" stroke-width="1.6"/>
      <text x="65" y="710">Chat</text>
    </g>
    <g fill="#7d92b4">
      <rect x="178" y="675" width="34" height="22" rx="4" fill="none" stroke="#7d92b4" stroke-width="1.6"/>
      <path d="M184 681l4 4-4 4M194 691h6" stroke="#7d92b4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="195" y="710">Terminal</text>
    </g>
    <g fill="#4f8cff">
      <rect x="306" y="675" width="30" height="22" rx="3" fill="none" stroke="#4f8cff" stroke-width="1.6"/>
      <path d="M306 681h30" stroke="#4f8cff" stroke-width="1.4"/>
      <text x="321" y="710">Browser</text>
    </g>
  </g>
</svg>
