<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>todo.demo.local</title>
<style>
  :root {
    --bg: #05090f;
    --surface: rgba(16,24,42,0.92);
    --border: rgba(160,184,224,0.14);
    --accent: #50b8ff;
    --green: #3ef0a0;
    --text: #d6e6ff;
    --text-dim: rgba(214,230,255,0.66);
    --text-faint: rgba(214,230,255,0.38);
    --mono: 'JetBrains Mono', 'Fira Code', 'IBM Plex Mono', ui-monospace, monospace;
    --sans: 'Space Grotesk', system-ui, sans-serif;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px 16px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
  }
  .brand span { color: var(--accent); }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .subtitle {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(80,184,255,0.10);
    border: 1px solid rgba(80,184,255,0.28);
    border-radius: 99px;
    padding: 2px 8px;
  }
  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: rgba(80,184,255,0.04); }
  .checkbox {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid rgba(160,184,224,0.32);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .checkbox.done {
    border-color: var(--green);
    background: rgba(62,240,160,0.12);
  }
  .checkmark {
    display: none;
    width: 10px; height: 10px;
    border-radius: 2px;
    background: var(--green);
  }
  .checkbox.done .checkmark { display: block; }
  .task-text {
    font-size: 14px;
    color: var(--text);
    flex: 1;
  }
  .task-text.done {
    color: var(--text-faint);
    text-decoration: line-through;
    text-decoration-color: rgba(62,240,160,0.45);
  }
  .task-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    min-width: 20px;
    text-align: right;
  }
  .footer {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--border);
    background: rgba(0,4,12,0.30);
  }
  .footer-stat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }
  .footer-stat span { color: var(--green); }
  .pill {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    background: rgba(62,240,160,0.10);
    border: 1px solid rgba(62,240,160,0.28);
    border-radius: 99px;
    padding: 3px 9px;
    color: var(--green);
    margin-left: auto;
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span>&gt;</span>conduit</div>
  <div class="badge">preview</div>
</header>
<h1>To-Do</h1>
<p class="subtitle">todo.demo.local &mdash; /home/user/projects/todo/todo.py</p>
<div class="card">
  <div class="card-header">
    <div class="card-header-left">
      <div class="dot"></div>
      All Tasks
    </div>
    <div class="badge">claude</div>
  </div>
  <ul class="task-list">
    <li class="task-item">
      <span class="task-num">1</span>
      <div class="checkbox">
        <div class="checkmark"></div>
      </div>
      <span class="task-text">Buy groceries</span>
    </li>
    <li class="task-item">
      <span class="task-num">2</span>
      <div class="checkbox done">
        <div class="checkmark"></div>
      </div>
      <span class="task-text done">Ship the release</span>
    </li>
    <li class="task-item">
      <span class="task-num">3</span>
      <div class="checkbox">
        <div class="checkmark"></div>
      </div>
      <span class="task-text">Call the dentist</span>
    </li>
    <li class="task-item">
      <span class="task-num">4</span>
      <div class="checkbox">
        <div class="checkmark"></div>
      </div>
      <span class="task-text">Review the PR</span>
    </li>
  </ul>
  <div class="footer">
    <span class="footer-stat"><span>1</span> done</span>
    <span class="footer-stat">&middot;</span>
    <span class="footer-stat"><span>3</span> remaining</span>
    <span class="pill">live preview</span>
  </div>
</div>
</body>
</html>
