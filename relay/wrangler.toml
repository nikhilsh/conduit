name = "conduit-push"
main = "src/index.ts"
compatibility_date = "2026-06-10"
routes = [
  { pattern = "push.conduit.nikhil.sh", custom_domain = true }
]

# Rate-limit counters + per-install auth hashes. Create the namespace with
#   wrangler kv namespace create RATE_LIMIT
# then paste the returned id below (replace the placeholder). The id here is a
# placeholder so the repo never carries a live namespace binding.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "a0ea236a6ca64f86ad67679db5337fbe"

# Secrets are NEVER stored in this file — set them with `wrangler secret put`:
#   APNS_KEY            (.p8 PEM contents, multi-line)
#   APNS_KEY_ID         (10-char Apple key id)
#   APNS_TEAM_ID        (10-char Apple team id, e.g. EHW7L3679R)
#   APNS_TOPIC          (bundle id, e.g. sh.nikhil.conduit)
#   FCM_SERVICE_ACCOUNT (Firebase service-account JSON, full file contents)
# See relay/README.md for the full provisioning runbook.

